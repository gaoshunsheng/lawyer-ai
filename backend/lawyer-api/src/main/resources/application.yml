server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: lawyer-ai-assistant

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/lawyer_ai
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: LawyerAIHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lawyer.*.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: lawyer-ai-assistant-jwt-secret-key-2024
  expiration: 7200  # 2小时，单位：秒
  refresh-expiration: 604800  # 7天，单位：秒
  header: Authorization
  prefix: "Bearer "

# 日志配置
logging:
  level:
    root: INFO
    com.lawyer: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Knife4j API文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# 应用配置
app:
  # 租户配置
  tenant:
    enabled: true
    ignore-tables:
      - sys_user
      - sys_role
      - sys_permission
      - sys_tenant

  # 文件上传配置
  file:
    upload-path: /data/uploads
    allowed-types: pdf,doc,docx,jpg,jpeg,png,gif
    max-size: 20971520  # 20MB

  # AI服务配置
  ai:
    base-url: http://localhost:8000
    timeout: 60000

# AI服务配置
ai:
  service:
    url: http://localhost:8001
    connect-timeout: 5000
    read-timeout: 60000
    enabled: true
    default-model: gpt-4-turbo-preview
    default-temperature: 0.7
    max-tokens: 4000
